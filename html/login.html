<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExScent - Admin Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .login-page {
            display: grid;
            grid-template-columns: 1fr 1fr;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000000;
            padding: 10px;     
        }

        .left-box {
            width: 100%;
            height: 100%;
            padding: 20px;
            background: linear-gradient(to right, #D9C3AB, #F16001, #C10801, #000000);
            border-radius: 8px;
            color: white;
            text-align: center;
            display: flex;
            flex-direction: column;       
            justify-content: center;
            align-items: center;       
            gap: 20px;
        }

        .left-box a {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
        }

        .left-content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 20px;
        }

        .brand-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
        }

        .right-box {
            width: 100%;
            height: 100%;
            padding: 40px;
            background-color: #000000;
            border-radius: 8px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;       
            align-items: center;           
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .login-form input {
            padding: 10px;
            border-radius: 4px;
            background-color: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3); 
            color: white; 
            outline: none;
        }

        .login-form input:focus {
            outline: none;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 5px;
            gap: 5px;
            border: none;
            outline: none;
        }

        .login-form button {
            padding: 10px;
            border-radius: 4px;
            border: none;
            background-color: #F16001;
            color: white;
        }
    </style>
</head>
<body class="login-page"> 
    <div class="left-box">
        <div class="left-content-wrapper">
            <a href="/">
                <img src="https://fonts.gstatic.com/s/i/short-term/release/materialsymbolsoutlined/arrow_back/default/24px.svg" alt="arrow" style="filter: invert(1);">
                <p>BACK TO MAIN LOBBY</p>
            </a>
            <div class="brand-wrapper">
                <img src="images/icon/logo.svg" alt="logo">
                <h1>EXSCENT</h1>
            </div>
        </div>
    </div>
    <div class="right-box">
        <form class="login-form" action="/admin_login" method="POST" id="login-form">
            <h1>ADMINISTRATOR LOGIN</h1>

            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit">LOG IN</button>
        </form>
    </div>
</body>
<script>
    document.getElementById('login-form').addEventListener('submit', function() {
        const username = document.querySelector('input[name="username"]').value;
        localStorage.setItem('adminUsername', username);
    });
</script>
</html>
