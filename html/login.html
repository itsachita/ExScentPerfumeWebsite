<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error: Page not found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .login-page {
            display: grid;
            grid-template-columns: 1fr 1fr;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000000;
            padding: 10px;              /* Add padding to prevent content from touching the edges */         
        }

        .left-box {
            width: 100%;
            height: 100%;
            padding: 20px;
            background: linear-gradient(to right, #D9C3AB, #F16001, #C10801, #000000);
            border-radius: 8px;
            color: white;
            text-align: center;             /* Set text to left */
            display: flex;
            flex-direction: column;         /* Display in column */
            justify-content: center;
            align-items: center;       /* Align items to the left */
            gap: 20px;
        }

        .left-box a {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;           /* Align items vertically */
            font-size: 15px;
        }

        .brand-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
        }

        .right-box {
            width: 100%;
            height: 100%;
            padding: 40px;
            background-color: #000000;
            border-radius: 8px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;       /* Center form horizontally */
            align-items: center;           /* Center form vertically */
        }

        .login-form {
            display: flex;
            flex-direction: column;         /* Display in column */
            gap: 20px;                    /* Space between form elements */
        }

        .login-form input {
            padding: 10px;
            border-radius: 4px;
            opacity: 0.6;
            border: none;
        }

        .login-form button {
            padding: 10px;
            border-radius: 4px;
            border: none;
            background-color: #F16001;
            color: white;
        }
    </style>
</head>
<body class="login-page"> 
    <div class="left-box">
        <a href="/">
            <img src="images/alt-icons/arrow-left.svg" alt="arrow">
            <p>BACK TO MAIN LOBBY</p>
        </a>
        <div class="brand-wrapper">
            <img src="images/header/logo.svg" alt="logo">
            <h1>EXSCENT</h1>
        </div>
    </div>
    <div class="right-box">
        <form class="login-form">
            <h1>ADMINISTRATOR LOGIN</h1>
            <p>Username</p>
            <input type="username" required>
            <p>Password</p>
            <input type="password" required>
            <button type="submit">LOG IN</button>
        </form>
    </div>
</body>
</html>
