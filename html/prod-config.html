<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXSCENT - Configuration</title>
    <link rel="stylesheet" href="css/style-admin.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>

<header class="admin-header">
    <div class="admin-nav-group">
        <a href="/" class="logo">
            <img src="images/icon/logo.svg" alt="Logo" style="height: 45px;">
        </a>
        <nav class="admin-nav-links">
            <a href="/prod-admin">DASHBOARD</a>
            <a href="prod-admin">PRODUCT</a>
            <a href="prod-order">ORDER</a>
            <a href="prod-invoice">INVOICE</a>
        </nav>
    </div>
    
    <div class="admin-right-section">
        <a href="/admin_login" class="admin-profile-btn">
            <span class="material-symbols-outlined">account_circle</span>
            <span id="admin-username-display">Hello</span>
        </a>
        <a href="admin-login" class="admin-logout">
            <span class="material-symbols-outlined" style="color: #FFFFFF">logout</span>
        </a>
    </div>
</header>

<main class="admin-main-content">
    <div class="admin-page-header">
        <h1>CONFIGURATION</h1>
        <div class="header-actions">
            <button id="confirm-btn" class="btn-confirm">
                <span class="material-symbols-outlined" style="font-size: 18px;">check</span> CONFIRM
            </button>
        </div>
    </div>

    <div class="config-container">
        <div class="config-left">
            <h2 class="config-section-title">PRODUCT IMAGE</h2>
            
            <div class="img-placeholder-large" id="main-image-container" onclick="uploadImage(0)">
                <span class="material-symbols-outlined" style="font-size: 40px; color: rgba(255,255,255,0.5);">add_photo_alternate</span>
            </div>
            
            <div class="img-placeholder-row">
                <div class="img-placeholder-small" onclick="uploadImage(1)"><span class="material-symbols-outlined">add</span></div>
                <div class="img-placeholder-small" onclick="uploadImage(2)"><span class="material-symbols-outlined">add</span></div>
                <div class="img-placeholder-small" onclick="uploadImage(3)"><span class="material-symbols-outlined">add</span></div>
                <div class="img-placeholder-small" onclick="uploadImage(4)"><span class="material-symbols-outlined">add</span></div>
            </div>
            
            <button class="btn-outline btn-full-width" style="margin-top: 15px;" onclick="uploadNextAvailable()">+ ADD IMAGE</button>
            
            <p class="config-help-text">
                Max File Size: 5MB<br>
                Aspect Ratio Should Be 4:3
            </p>
        </div>

        <div class="config-right">
            <h2 class="config-section-title">GENERAL INFORMATION</h2>
            
            <div class="form-row" style="grid-template-columns: 2fr 1fr;">
                <div class="form-group">
                    <label>Product ID</label>
                    <input type="text" id="product_id" class="config-input" readonly style="opacity: 0.5; cursor: not-allowed; background: rgba(255,255,255,0.05);" placeholder="Auto-generated">
                </div>
                <div class="form-group">
                    <label>&nbsp;</label>
                    <div class="status-select-wrapper" style="width: 100%; height: 35px;">
                        <span class="dot green"></span>
                        <select class="status-select" style="height: 100%; padding-top: 0; padding-bottom: 0;" onchange="this.previousElementSibling.className = 'dot ' + (this.value === 'active' ? 'green' : 'red')">
                            <option value="active">Active</option>
                            <option value="disabled">Disabled</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Product Name</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="product_name" class="config-input" style="flex: 1;">
                        <button id="search-fragella" class="btn-sync">
                            <span class="material-symbols-outlined" style="font-size: 16px;">search</span> Search Fragella
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Brand</label>
                    <input type="text" id="brand" class="config-input">
                </div>
                <div class="form-group">
                    <label>Rating (out of 5)</label>
                    <input type="number" id="rating" class="config-input" step="0.01" min="0" max="5" value="0">
                </div>
                <div class="form-group">
                    <label>Votes</label>
                    <input type="number" id="votes" class="config-input" value="0">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Concentration</label>
                    <div class="config-select-dark-wrapper">
                        <select id="concentration" class="config-select-dark">
                            <option value="EAU DE TOILETTE">EDT</option>
                            <option value="EAU DE PARFUM">EDP</option>
                            <option value="PARFUM">Parfum</option>
                            <option value="EAU DE COLOGNE">Cologne</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Gender Preference</label>
                    <div class="config-select-dark-wrapper">
                        <select id="gender" class="config-select-dark">
                            <option value="Unisex">UNISEX</option>
                            <option value="Masculine">MASCULINE</option>
                            <option value="Feminine">FEMININE</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-group" style="margin-top: 20px;">
                <label>Description (Notes)</label>
                <textarea id="product_detail" class="config-textarea" rows="6"></textarea>
            </div>

            <h2 class="config-section-title" style="margin-top: 30px;">PRICING & STOCK</h2>
            <div id="variants-container">
            </div>
            
            <button class="btn-add-square" type="button" onclick="addVariantRow()" style="margin-top: 10px;">
                <span class="material-symbols-outlined">add</span>
            </button>

            <input type="hidden" id="image_url">
        </div>
    </div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const searchFragellaBtn = document.getElementById('search-fragella');
        const saveBtn = document.getElementById('confirm-btn');
        const mainImageContainer = document.getElementById('main-image-container');
        const smallPlaceholders = document.querySelectorAll('.img-placeholder-small');
        
        let productImages = [null, null, null, null, null];
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        const isEdit = !!productId;

        window.addVariantRow = (volume = '', price = '', stock = '100') => {
            const container = document.getElementById('variants-container');
            const row = document.createElement('div');
            row.className = 'form-row variant-row';
            row.style.gridTemplateColumns = '1fr 1fr 1fr auto';
            row.style.alignItems = 'end';
            row.style.marginBottom = '10px';
            
            row.innerHTML = `
                <div class="form-group">
                    <label>Volume (ml)</label>
                    <input type="number" class="config-input var-volume" value="${volume}" placeholder="e.g. 50">
                </div>
                <div class="form-group">
                    <label>Price (THB)</label>
                    <input type="number" class="config-input var-price" value="${price}" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" class="config-input var-stock" value="${stock}">
                </div>
                <div class="form-group">
                    <button class="btn-sync" type="button" onclick="this.closest('.variant-row').remove()" style="background: rgba(255,0,0,0.1); color: #ff4d4d; border-color: rgba(255,0,0,0.2);">
                        <span class="material-symbols-outlined" style="font-size: 18px;">delete</span>
                    </button>
                </div>
            `;
            container.appendChild(row);
        };

        if (isEdit) {
            document.querySelector('h1').textContent = 'EDIT PRODUCT';
            try {
                const response = await fetch(`/api/perfume/${productId}`);
                const data = await response.json();
                
                if (data.success) {
                    const product = data.product;
                    const images = data.images;
                    const variants = data.variants || [];

                    document.getElementById('product_id').value = product.product_id;
                    document.getElementById('product_name').value = product.product_name;
                    document.getElementById('brand').value = product.brand;
                    document.getElementById('rating').value = product.rating || 0;
                    document.getElementById('votes').value = product.votes || 0;
                    document.getElementById('concentration').value = product.concentration;
                    document.getElementById('gender').value = product.gender;
                    document.getElementById('product_detail').value = product.product_detail;
                    
                    document.querySelector('.status-select').value = (product.product_status || 'active').toLowerCase();
                    document.querySelector('.dot').className = 'dot ' + ((product.product_status || 'active').toLowerCase() === 'active' ? 'green' : 'red');

                    if (images && images.length > 0) {
                        images.forEach((img, idx) => {
                            if (idx < 5) updateImagePreview(idx, img.image_url);
                        });
                    }

                    if (variants.length > 0) {
                        variants.forEach(v => addVariantRow(v.volume, v.price, v.stock));
                    } else {
                        addVariantRow();
                    }
                }
            } catch (err) {
                console.error('Error fetching product:', err);
            }
        } else {
            const newId = Math.floor(Math.random() * 9000000000000) + 1000000000000;
            document.getElementById('product_id').value = newId;
            addVariantRow();
        }

        window.uploadImage = (index) => {
            const url = prompt('Enter Image URL:');
            if (url) updateImagePreview(index, url);
        };

        window.uploadNextAvailable = () => {
            const nextIndex = productImages.findIndex(img => img === null);
            if (nextIndex === -1) return alert('Maximum of 5 images reached.');
            uploadImage(nextIndex);
        };

        window.removeImage = (event, index) => {
            event.stopPropagation(); // Prevent triggering uploadImage
            if (!confirm('Remove this image?')) return;
            
            productImages[index] = null;
            const container = index === 0 ? mainImageContainer : smallPlaceholders[index-1];
            const icon = index === 0 ? 'add_photo_alternate' : 'add';
            const fontSize = index === 0 ? '40px' : '24px';
            
            container.innerHTML = `<span class="material-symbols-outlined" style="font-size: ${fontSize}; color: rgba(255,255,255,0.5);">${icon}</span>`;
        };

        function updateImagePreview(index, url) {
            productImages[index] = url;
            const container = index === 0 ? mainImageContainer : smallPlaceholders[index-1];
            
            container.innerHTML = `
                <img src="${url}" style="width: 100%; height: 100%; object-fit: ${index === 0 ? 'contain' : 'cover'};">
                <div class="remove-img-btn" onclick="removeImage(event, ${index})">
                    <span class="material-symbols-outlined" style="font-size: 16px;">close</span>
                </div>
            `;
        }

        // Mapping helpers
        const mapGender = (fragGender) => {
            if (fragGender === 'men') return 'Masculine';
            if (fragGender === 'women') return 'Feminine';
            return 'Unisex';
        };

        const mapConcentration = (oilType) => {
            const ot = oilType.toLowerCase();
            if (ot.includes('toilette')) return 'EAU DE TOILETTE';
            if (ot.includes('parfum')) return 'EAU DE PARFUM';
            if (ot.includes('cologne')) return 'EAU DE COLOGNE';
            return 'PARFUM';
        };

        searchFragellaBtn.addEventListener('click', async () => {
            const name = document.getElementById('product_name').value;
            if (!name) return alert('Please enter a product name first.');

            searchFragellaBtn.disabled = true;
            searchFragellaBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size: 16px; animation: spin 1s linear infinite;">sync</span> Searching...';

            try {
                const res = await fetch(`/admin/search-fragella?name=${encodeURIComponent(name)}`);
                const data = await res.json();
                
                if (data.success) {
                    const frag = data.data;
                    document.getElementById('brand').value = frag.brand;
                    document.getElementById('rating').value = frag.rating;
                    document.getElementById('votes').value = frag.votes || 0;
                    document.getElementById('concentration').value = mapConcentration(frag.concentration);
                    document.getElementById('gender').value = mapGender(frag.gender);
                    document.getElementById('product_detail').value = frag.notes;
                    
                    if (frag.imageUrl) {
                        updateImagePreview(0, frag.imageUrl);
                    }
                } else {
                    alert('No results found on Fragella.');
                }
            } catch (error) {
                console.error('Fragella search error:', error);
            } finally {
                searchFragellaBtn.disabled = false;
                searchFragellaBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size: 16px;">search</span> Search Fragella';
            }
        });

        saveBtn.addEventListener('click', async () => {
            const variantRows = document.querySelectorAll('.variant-row');
            const variants = Array.from(variantRows).map(row => ({
                volume: row.querySelector('.var-volume').value,
                price: row.querySelector('.var-price').value,
                stock: row.querySelector('.var-stock').value
            })).filter(v => v.volume && v.price);

            const payload = {
                product_id: document.getElementById('product_id').value || null,
                product_name: document.getElementById('product_name').value,
                product_price: variants.length > 0 ? variants[0].price : 0, // Fallback
                product_detail: document.getElementById('product_detail').value,
                product_status: document.querySelector('.status-select').value === 'active' ? 'Active' : 'Disabled',
                brand: document.getElementById('brand').value,
                rating: document.getElementById('rating').value,
                votes: document.getElementById('votes').value,
                concentration: document.getElementById('concentration').value,
                gender: document.getElementById('gender').value,
                images: productImages.filter(img => img !== null),
                variants: variants,
                isEdit: isEdit
            };

            console.log('Attempting to save product:', payload);

            if (!payload.product_name || !payload.brand || variants.length === 0) {
                return alert('Please fill in Product Name, Brand, and at least one Volume/Price.');
            }

            saveBtn.disabled = true;
            saveBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size: 18px;">sync</span> SAVING...';

            try {
                const response = await fetch('/api/perfume', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                console.log('Save result:', result);

                if (result.success) {
                    alert(isEdit ? 'Product updated successfully!' : 'Product created successfully!');
                    window.location.href = '/prod-admin';
                } else {
                    alert('Error: ' + (result.error || 'Failed to save product'));
                    saveBtn.disabled = false;
                    saveBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size: 18px;">check</span> CONFIRM';
                }
            } catch (error) {
                console.error('Network/Server error during save:', error);
                alert('Error saving product: ' + error.message);
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size: 18px;">check</span> CONFIRM';
            }
        });
    });
</script>

<footer class="main-footer">
    <div class="footer-top">
        <div class="footer-logo">
            <img src="images/icon/full_logo.svg" alt="EXSCENT Logo">
        </div>
    </div>
</footer>

<script>
    const adminUsername = localStorage.getItem('adminUsername');
    document.getElementById('admin-username-display').textContent = adminUsername ? 'Hello, ' + adminUsername : 'Hello';
</script>
</body>
</html>
