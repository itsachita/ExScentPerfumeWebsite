<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExScent - Search</title>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <a href="/">
                <img src="images/icon/logo.svg" alt="Logo" style="height: 40px;">
            </a>
        </div>

        <nav class="nav-menu">
            <a href="all-frags.html">All Fragrances</a>
            <a href="fragrance-feminine.html">Feminine</a>
            <a href="fragrance-masculine.html">Masculine</a>
            <a href="fragrance-unisex.html">Unisex</a>
            <a href="brands.html">Brands</a>
        </nav>

        <div class="right-section">
            <div class="icons">
                <a href="cart.html">
                    <img src="https://fonts.gstatic.com/s/i/short-term/release/materialsymbolsoutlined/shopping_bag/default/24px.svg" alt="Cart" style="height: 24px; filter: invert(1);">
                </a>
                <a href="login.html">
                    <img src="https://fonts.gstatic.com/s/i/short-term/release/materialsymbolsoutlined/person/default/24px.svg" alt="Admin" style="height: 24px; filter: invert(1);">
                </a>
            </div>
        </div>
    </header>

   <main>
        <div class="controls-area">
            <div class="filter-row">
                <span class="search-for-text">SEARCH SCOPED BY</span>
                <div class="filter-options">
                    <label class="filter-item"><input type="checkbox" id="scope-brands" value="brands" checked> BRANDS</label>
                    <label class="filter-item"><input type="checkbox" id="scope-products" value="products" checked> PRODUCTS</label>
                    <label class="filter-item"><input type="checkbox" id="scope-notes" value="notes" checked> FRAGRANCE NOTES</label>
                </div>
                <form class="main-search-input" id="search-form" action="#" method="GET">
                    <input type="text" name="q" id="search-input" placeholder="SEARCH">
                    <button type="submit" class="search-btn">SEARCH</button>
                </form>
            </div>

            <div class="sort-filter-row">
                <label>Sort By</label>
                <select class="custom-select" id="sort-select">
                    <option value="">Select</option>
                    <option value="Price">Price</option>
                    <option value="A-Z">A-Z</option>
                    <option value="Rating">Rating</option>
                </select>
                <label style="margin-left:15px;">Filter By</label>
                <select class="custom-select" id="filter-conc">
                    <option value="">Filter By</option>
                    <option value="EDT">EDT</option>
                    <option value="EDP">EDP</option>
                    <option value="Parfum">Parfum</option>
                </select>
                <select class="custom-select" id="filter-gender">
                    <option value="">Filter By</option>
                    <option value="Unisex">Unisex</option>
                    <option value="Feminine">Feminine</option>
                    <option value="Masculine">Masculine</option>
                </select>
            </div>
        </div>

        <section class="product-pannel" id="search-results-container">
            <!-- Products will be injected here dynamically -->
        </section>

        <section class="product-pannel">
            <div class="title">
                <h1>YOU MIGHT BE INTERESTED IN</h1>
            </div>
        
            <div class="product-scroll" id="recommendations">
                <!-- Recommendations will load here -->
            </div>
        </section>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-top">
            <div class="footer-logo">
                <img src="images/icon/full_logo.svg" alt="EXSCENT Logo">
            </div>

            <div class="newsletter-section">
                <p class="newsletter-title">DON'T MISS THE NEWS, SUBSCRIBE TO OUR NEWSLETTER</p>
                <form class="newsletter-form">
                    <input type="email" placeholder="ENTER YOUR E-MAIL" required>
                    <button type="submit">SUBSCRIBE</button>
                </form>
            </div>
        </div>

        <div class="footer-bottom">
            <nav class="footer-links">
                <a href="#">LEARN MORE</a>
                <a href="#">COOKIES SETTING</a>
                <a href="#">PRIVACY & COOKIES POLICY</a>
                <a href="#">TERMS OF USE</a>
            </nav>
            <div class="social-icons">
                <a href="#">
                    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/instagram.svg" alt="Instagram" style="height: 20px; filter: invert(1);">
                </a>
                <a href="#">
                    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/x.svg" alt="X" style="height: 20px; filter: invert(1);">
                </a>
            </div>
        </div>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const initialQuery = urlParams.get('q');

            const searchInput = document.getElementById('search-input');
            const searchForm = document.getElementById('search-form');
            const resultsContainer = document.getElementById('search-results-container');

            const sortSelect = document.getElementById('sort-select');
            const filterConc = document.getElementById('filter-conc');
            const filterGender = document.getElementById('filter-gender');

            const scopeCheckboxes = [
                document.getElementById('scope-brands'),
                document.getElementById('scope-products'),
                document.getElementById('scope-notes')
            ];

            if (initialQuery && searchInput) {
                searchInput.value = initialQuery;
            }

            const fetchProducts = async () => {
                const q = searchInput.value;
                const sort = sortSelect.value;
                const concentration = filterConc.value;
                const gender = filterGender.value;

                const scopes = scopeCheckboxes
                    .filter(cb => cb.checked)
                    .map(cb => cb.value)
                    .join(',');

                const params = new URLSearchParams();
                if (q) params.append('q', q);
                if (scopes) params.append('scopes', scopes);
                if (sort) params.append('sort', sort);
                if (concentration) params.append('concentration', concentration);
                if (gender) params.append('gender', gender);
                params.append('status', 'Active');

                try {
                    const response = await fetch(`/api/search?${params.toString()}`);
                    const products = await response.json();
                    
                    // Update URL without reloading
                    const newUrl = `${window.location.pathname}?${params.toString()}`;
                    window.history.pushState({ path: newUrl }, '', newUrl);
                    
                    renderProducts(products);
                } catch (error) {
                    console.error('Error fetching products:', error);
                    resultsContainer.innerHTML = '<p style="color: white;">Error loading products.</p>';
                }
            };

            const renderProducts = (products) => {
                resultsContainer.innerHTML = '';
                
                if (products.length === 0) {
                    resultsContainer.innerHTML = '<p style="color: white; width: 100%; text-align: center; margin-top: 50px; font-size: 20px;">No products found.</p>';
                    return;
                }

                products.forEach(product => {
                    const productHtml = `
                        <div class="product-item" onclick="window.location.href='/product?id=${product.product_id}'" style="cursor: pointer;">
                            <div class="image-box">
                                <img src="${product.image_url || 'https://via.placeholder.com/300x400?text=No+Image'}" alt="${product.product_name}">
                            </div>
                            <div class="product-info">
                                <p class="brand">${product.brand}</p>
                                <p class="name">${product.product_name}</p>
                                <p class="price">THB ${parseFloat(product.product_price).toLocaleString('en-US', {minimumFractionDigits: 2})}</p>
                            </div>
                        </div>
                    `;
                    resultsContainer.insertAdjacentHTML('beforeend', productHtml);
                });
            };

            // Event Listeners
            searchForm.addEventListener('submit', (e) => {
                e.preventDefault();
                fetchProducts();
            });

            sortSelect.addEventListener('change', fetchProducts);
            filterConc.addEventListener('change', fetchProducts);
            filterGender.addEventListener('change', fetchProducts);
            scopeCheckboxes.forEach(cb => cb.addEventListener('change', fetchProducts));

            const fetchRecommendations = async () => {
                try {
                    const res = await fetch('/api/search?sort=Rating&status=Active');
                    const products = await res.json();
                    const container = document.getElementById('recommendations');
                    
                    container.innerHTML = products.map(p => `
                        <div class="product-item" onclick="window.location.href='/product?id=${p.product_id}'" style="cursor: pointer;">
                            <div class="image-box">
                                <img src="${p.image_url || 'https://via.placeholder.com/300x400?text=No+Image'}" alt="${p.product_name}">
                            </div>
                            <div class="product-info">
                                <p class="brand">${p.brand}</p>
                                <p class="name">${p.product_name}</p>
                                <p class="price">THB ${parseFloat(p.product_price).toLocaleString('en-US', {minimumFractionDigits: 2})}</p>
                            </div>
                        </div>
                    `).join('');
                } catch (error) {
                    console.error('Error fetching recommendations:', error);
                }
            };

            // Initial fetch
            fetchProducts();
            fetchRecommendations();
        });
    </script>
</body>
</html>
