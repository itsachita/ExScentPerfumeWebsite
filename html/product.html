<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - ExScent</title>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <a href="/">
                <img src="images/icon/logo.svg" alt="Logo" style="height: 40px;">
            </a>
        </div>

        <nav class="nav-menu">
            <a href="all-frags">All Fragrances</a>
            <a href="fragrance-feminine">Feminine</a>
            <a href="fragrance-masculine">Masculine</a>
            <a href="fragrance-unisex">Unisex</a>
            <a href="brands">Brands</a>
        </nav>

        <div class="right-section">
            <form class="search-container" action="search.html" method="GET">
                <input type="text" name="q" placeholder="SEARCH">
            </form>
            <div class="icons">
                <a href="/cart">
                    <img src="https://fonts.gstatic.com/s/i/short-term/release/materialsymbolsoutlined/shopping_bag/default/24px.svg" alt="button" style="height: 24px; filter: invert(1);">
                </a>
                <a href="/admin_login">
                    <img src="https://fonts.gstatic.com/s/i/short-term/release/materialsymbolsoutlined/person/default/24px.svg" alt="button" style="height: 24px; filter: invert(1);">
                </a>
            </div>
        </div>
    </header>

<main class="product-page-wrapper">
        <div class="product-detail-layout">
            
            <div class="product-gallery">
                <div class="main-image">
                    <img src="https://via.placeholder.com/600x600?text=Loading..." alt="Product Image">
                </div>
                <div class="thumbnail-list">
                    <!-- Thumbnails will load here -->
                </div>
            </div>

            <div class="main-product-info">                
                <h1 class="product-title">Loading...</h1>
                
                <div class="product-desc">
                    <p>Loading details...</p>
                </div>

                <div class="concentration-row">
                    <span class="concentration-label">CONCENTRATION</span>
                    <div class="dots">
                        <div class="dot outline"></div>
                        <div class="dot outline"></div>
                        <div class="dot outline"></div>
                        <div class="dot outline"></div>
                        <div class="dot outline"></div>
                    </div>
                </div>

                <div class="price-size-display">
                    THB 0.00 <span class="divider">|</span> -- ml
                </div>

                <div class="size-options">
                    <button class="size-btn">50 ml</button>
                    <button class="size-btn active">75 ml</button>
                    <button class="size-btn">125 ml</button>
                </div>

                <div class="action-row">
                    <div class="qty-selector">
                        <button class="qty-btn">-</button>
                        <span class="qty-num">1</span>
                        <button class="qty-btn">+</button>
                    </div>
                    <button class="add-cart-btn">Add to cart</button>
                </div>
            </div>
            
        </div>
    </main>

        <section class="product-pannel">
            <div class="title">
                <h1>YOU MIGHT BE INTERESTED IN</h1>
            </div>
        
            <div class="product-scroll">
                <!-- Recommendations will load here -->
            </div>
        </section>

    <footer class="main-footer">
        <div class="footer-top">
            <div class="footer-logo">
                <img src="images/icon/full_logo.svg" alt="EXSCENT Logo">
            </div>

            <div class="newsletter-section">
                <p class="newsletter-title">DON'T MISS THE NEWS, SUBSCRIBE TO OUR NEWSLETTER</p>
                <form class="newsletter-form">
                    <input type="email" placeholder="ENTER YOUR E-MAIL" required>
                    <button type="submit">SUBSCRIBE</button>
                </form>
            </div>
        </div>

        <div class="footer-bottom">
            <nav class="footer-links">
                <a href="/about-us">LEARN MORE</a>
                <a href="/cookies">COOKIES SETTING</a>
                <a href="/policy">PRIVACY & COOKIES POLICY</a>
                <a href="/terms-of-use">TERMS OF USE</a>
            </nav>
            <div class="social-icons">
                <a href="https://www.instagram.com">
                    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/instagram.svg" alt="Instagram" style="height: 20px; filter: invert(1);">
                </a>
                <a href="https://www.x.com">
                    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/x.svg" alt="X" style="height: 20px; filter: invert(1);">
                </a>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            if (!productId) {
                window.location.href = '/search.html';
                return;
            }

            const fetchProductDetail = async () => {
                try {
                    const response = await fetch(`/api/perfume/${productId}`);
                    const data = await response.json();
                    
                    if (!data.success) {
                        alert('Product not found');
                        window.location.href = '/search.html';
                        return;
                    }

                    const product = data.product;
                    const images = data.images;
                    const variants = data.variants || [];

                    // Update Basic Info
                    document.title = `${product.product_name} - ExScent`;
                    document.querySelector('.product-title').textContent = product.product_name;
                    
                    const displayPrice = variants.length > 0 ? variants[0].price : product.product_price;
                    const displayVolume = variants.length > 0 ? variants[0].volume : '75';
                    
                    const priceSizeContainer = document.querySelector('.price-size-display');
                    priceSizeContainer.innerHTML = `THB ${parseFloat(displayPrice).toLocaleString()} <span class="divider">|</span> ${displayVolume} ml`;

                    // Update Variants (Volume buttons)
                    const sizeContainer = document.querySelector('.size-options');
                    if (variants.length > 0) {
                        sizeContainer.innerHTML = variants.map((v, idx) => `
                            <button class="size-btn ${idx === 0 ? 'active' : ''}" 
                                    onclick="updatePrice('${v.price}', '${v.volume}', this)">
                                ${v.volume}ml
                            </button>
                        `).join('');
                    } else {
                        sizeContainer.innerHTML = '<p style="color: rgba(255,255,255,0.5);">No sizes available</p>';
                    }

                    // Update Description / Notes
                    const descContainer = document.querySelector('.product-desc');
                    const formattedVotes = (product.votes || 0).toLocaleString();
                    descContainer.innerHTML = `
                        <p>${product.rating || '0.00'} out of 5 with ${formattedVotes} votes on <a href="https://www.fragrantica.com" target="_blank" class="highlight-link">Fragrantica.com</a></p>
                        <p>Brand: ${product.brand}</p>
                        <p>Concentration: ${product.concentration}</p>
                        <p>Gender: ${product.gender}</p>
                        <p style="margin-top: 10px; opacity: 0.8; white-space: pre-wrap;">${product.product_detail || ''}</p>
                    `;

                    // Update Concentration Dots
                    const dots = document.querySelector('.dots');
                    let solidCount = 1; // Default for Cologne
                    const conc = (product.concentration || '').toUpperCase();
                    
                    if (conc.includes('EXTRAIT')) solidCount = 5;
                    else if (conc.includes('EAU DE PARFUM') || conc.includes('EDP')) solidCount = 3;
                    else if (conc.includes('EAU DE TOILETTE') || conc.includes('EDT')) solidCount = 2;
                    else if (conc.includes('EAU DE COLOGNE')) solidCount = 1;
                    else if (conc.includes('PARFUM')) solidCount = 4;
                    
                    dots.innerHTML = '';
                    for (let i = 0; i < 5; i++) {
                        dots.innerHTML += `<div class="dot ${i < solidCount ? 'solid' : 'outline'}"></div>`;
                    }

                    // Update Gallery
                    const mainImg = document.querySelector('.main-image img');
                    const thumbList = document.querySelector('.thumbnail-list');
                    
                    if (images.length > 0) {
                        mainImg.src = images[0].image_url;
                        thumbList.innerHTML = images.map((img, idx) => `
                            <div class="thumb-box ${idx === 0 ? 'active' : ''}" onclick="changeMainImage('${img.image_url}', this)">
                                <img src="${img.image_url}" alt="Thumb ${idx + 1}">
                            </div>
                        `).join('');
                    } else {
                        mainImg.src = 'https://via.placeholder.com/600x600?text=No+Image';
                        thumbList.innerHTML = '';
                    }

                    // Fetch Recommendations
                    fetchRecommendations();

                } catch (error) {
                    console.error('Error loading product details:', error);
                }
            };

            const fetchRecommendations = async () => {
                try {
                    const res = await fetch('/api/search?sort=Rating&status=Active');
                    const products = await res.json();
                    const container = document.querySelector('.product-scroll');
                    
                    container.innerHTML = products.map(p => `
                        <div class="product-item" onclick="window.location.href='/product?id=${p.product_id}'" style="cursor: pointer;">
                            <div class="image-box">
                                <img src="${p.image_url || 'https://via.placeholder.com/300x400?text=No+Image'}" alt="${p.product_name}">
                            </div>
                            <div class="product-info">
                                <p class="brand">${p.brand}</p>
                                <p class="name">${p.product_name}</p>
                                <p class="price">THB ${parseFloat(p.product_price).toLocaleString()}</p>
                            </div>
                        </div>
                    `).join('');
                } catch (error) {}
            };

            window.updatePrice = (price, volume, btn) => {
                document.querySelector('.price-size-display').innerHTML = `THB ${parseFloat(price).toLocaleString()} <span class="divider">|</span> ${volume} ml`;
                document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };

            window.changeMainImage = (url, thumb) => {
                document.querySelector('.main-image img').src = url;
                document.querySelectorAll('.thumb-box').forEach(b => b.classList.remove('active'));
                thumb.classList.add('active');
            };

            fetchProductDetail();

            // Quantity selector logic
            const minusBtn = document.querySelector('.qty-selector .qty-btn:first-child');
            const plusBtn = document.querySelector('.qty-selector .qty-btn:last-child');
            const qtyNumDisplay = document.querySelector('.qty-num');

            if (minusBtn && plusBtn && qtyNumDisplay) {
                minusBtn.addEventListener('click', () => {
                    let currentQty = parseInt(qtyNumDisplay.textContent);
                    if (currentQty > 1) qtyNumDisplay.textContent = currentQty - 1;
                });
                plusBtn.addEventListener('click', () => {
                    let currentQty = parseInt(qtyNumDisplay.textContent);
                    qtyNumDisplay.textContent = currentQty + 1;
                });
            }
            
            // Size buttons
            const sizeBtns = document.querySelectorAll('.size-btn');
            sizeBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    sizeBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        });
    </script>
</body>
</html>
