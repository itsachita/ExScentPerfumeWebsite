<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExScent - Admin Dashboard</title>
    <link rel="stylesheet" href="css/style-admin.css"/>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />
</head>
<!-- |||||||||||||||||||||||||||||||||< HEADER APPEARANCE >|||||||||||||||||||||||||||||||||||| -->
<body>
    <header class="admin-header">
        <div class="admin-nav-group">
            <a href="/" class="logo">
                <img src="images/icon/logo.svg" alt="Logo" style="height: 45px;">
            </a>
            <nav class="admin-nav-links">
                <a href="/prod-admin">DASHBOARD</a>
                <a href="prod-admin">PRODUCT</a>
                <a href="prod-order">ORDER</a>
                <a href="prod-invoice">INVOICE</a>
            </nav>
        </div>
        
        <div class="admin-right-section">
            <a href="/admin_login" class="admin-profile-btn">
                <span class="material-symbols-outlined">account_circle</span>
                <span id="admin-username-display">Hello</span>
            </a>
            
            <a href="/" class="admin-logout-btn">
                <span class="material-symbols-outlined">logout</span>
            </a>
        </div>
    </header>

<main class="admin-main-content">
    <div class="admin-page-header">
        <h1>PRODUCT DISPLAY</h1>
        <div class="header-actions">
            <a href="/prod-admin" class="btn-outline" style="color: #65C282; border-color: #65C282; padding: 8px 16px; font-size: 13px; height: 38px; box-sizing: border-box;">
                <span class="material-symbols-outlined" style="font-size: 18px;">check</span> CONFIRM
            </a>
            <button id="delete-selected-btn" class="btn-solid" style="background: #ff4444; border-color: #ff4444; padding: 8px 16px; font-size: 13px; height: 38px; box-sizing: border-box;">
                <span class="material-symbols-outlined" style="font-size: 18px;">delete</span> DELETE SELECTED
            </button>
        </div>
    </div>

    <div class="admin-controls">
        <div class="search-row">
            <div class="filter-options">
                <label class="filter-item"><input type="checkbox"> BRANDS</label>
                <label class="filter-item"><input type="checkbox"> PRODUCTS</label>
                <label class="filter-item"><input type="checkbox"> FRAGRANCE NOTES</label>
            </div>
            <div class="search-container">
                <div class="search-input-wrapper">
                    <input type="text" class="search-input" placeholder="SEARCH">
                </div>
                <button class="btn-search">SEARCH</button>
            </div>
        </div>

        <div class="filter-row">
            <div class="filter-group">
                <span>Sort By</span>
                <div class="select-wrapper">
                    <select class="custom-select">
                        <option>Select</option>
                        <option value="price">Price</option>
                        <option value="a-z">A-Z</option>
                        <option value="rating">Rating</option>
                    </select>
                </div>
            </div>
            <div class="filter-group">
                <span>Filter By</span>
                <div class="select-wrapper">
                    <select class="custom-select">
                        <option value="">All</option>
                        <option value="EDT">EDT</option>
                        <option value="EDP">EDP</option>
                        <option value="Parfum">Parfum</option>
                    </select>
                </div>
                <div class="select-wrapper">
                    <select class="custom-select">
                        <option value="">All</option>
                        <option value="Unisex">Unisex</option>
                        <option value="Feminine">Feminine</option>
                        <option value="Masculine">Masculine</option>
                    </select>
                </div>
                <div class="select-wrapper">
                    <select class="custom-select">
                        <option>IN-STOCK FRAGRANCES</option>
                        <option value="out-of-stock">OUT-OF-STOCK FRAGRANCES</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div class="admin-table" id="product-table">
        <div class="table-header">
            <div class="col-checkbox" style="width: 40px;"></div>
            <div class="col-product">Products</div>
            <div class="col-price">Prices / Unit</div>
            <div class="col-status">Status</div>
            <div class="col-configure">Configure</div>
        </div>
        <div id="table-body">
            <!-- Products will be loaded here -->
        </div>
    </div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const tableBody = document.getElementById('table-body');
        const searchInput = document.querySelector('.search-input');
        const searchBtn = document.querySelector('.btn-search');
        const sortSelect = document.querySelectorAll('.custom-select')[0];
        const concSelect = document.querySelectorAll('.custom-select')[1];
        const genderSelect = document.querySelectorAll('.custom-select')[2];
        const checkboxes = document.querySelectorAll('.filter-item input');
        const deleteSelectedBtn = document.getElementById('delete-selected-btn');

        const fetchProducts = async () => {
            const q = searchInput.value;
            const sort = sortSelect.value;
            const concentration = concSelect.value;
            const gender = genderSelect.value;
            
            const scopes = Array.from(checkboxes)
                .filter(cb => cb.checked)
                .map(cb => cb.parentElement.textContent.trim().toLowerCase().split(' ').join(''))
                .join(',');

            let url = `/api/search?q=${encodeURIComponent(q)}&sort=${sort}&concentration=${concentration}&gender=${gender}`;
            if (scopes) url += `&scopes=${scopes}`;

            try {
                const response = await fetch(url);
                const products = await response.json();
                renderTable(products);
            } catch (error) {
                console.error('Error fetching products:', error);
            }
        };

        const renderTable = (products) => {
            tableBody.innerHTML = '';
            if (products.length === 0) {
                tableBody.innerHTML = '<div class="table-row"><div class="col-product">No products found.</div></div>';
                return;
            }
            products.forEach(product => {
                const row = `
                    <div class="table-row">
                        <div class="col-checkbox" style="width: 40px;">
                            <label class="filter-item">
                                <input type="checkbox" data-id="${product.product_id}">
                            </label>
                        </div>
                        <div class="col-product">
                            <div class="product-image-box">
                                <img src="${product.image_url || 'https://via.placeholder.com/60/FFFFFF/000000?text=No+Image'}" alt="${product.product_name}">
                            </div>
                            <div class="product-details">
                                <span class="product-code" style="opacity: 0.6; font-size: 11px;">ID: ${product.product_id}</span>
                                <span class="product-brand">${product.brand}</span>
                                <span class="product-name">${product.product_name}</span>
                            </div>
                        </div>
                        <div class="col-price">THB ${parseFloat(product.product_price).toLocaleString()}</div>
                        <div class="col-status">
                            <div class="status-select-wrapper">
                                <span class="dot ${(product.product_status || '').toLowerCase().trim() === 'active' ? 'green' : 'red'}"></span>
                                <select class="status-select" onchange="updateStatus('${product.product_id}', this.value, this)">
                                    <option value="Active" ${product.product_status === 'Active' ? 'selected' : ''}>Active</option>
                                    <option value="Disabled" ${product.product_status === 'Disabled' ? 'selected' : ''}>Disabled</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-configure">
                            <button class="btn-edit" onclick="window.location.href='/prod-config?id=${product.product_id}'">
                                <span class="material-symbols-outlined" style="font-size: 16px;">edit</span> Edit
                            </button>
                        </div>
                    </div>
                `;
                tableBody.insertAdjacentHTML('beforeend', row);
            });
        };

        deleteSelectedBtn.addEventListener('click', async () => {
            const checkedCheckboxes = document.querySelectorAll('.col-checkbox input:checked');
            const idsToDelete = Array.from(checkedCheckboxes).map(cb => cb.getAttribute('data-id')).filter(id => id);

            if (idsToDelete.length === 0) return alert('Please select at least one product to delete.');
            if (!confirm(`Are you sure you want to delete ${idsToDelete.length} products?`)) return;

            try {
                const results = await Promise.all(idsToDelete.map(id => 
                    fetch(`/api/perfume/${id}`, { method: 'DELETE' }).then(r => r.json())
                ));

                const failures = results.filter(r => !r.success);
                if (failures.length === 0) {
                    alert('Successfully deleted selected products.');
                } else {
                    alert(`Deleted some products, but ${failures.length} failed.`);
                }
                fetchProducts();
            } catch (error) {
                console.error('Error in bulk delete:', error);
                alert('An error occurred during deletion.');
            }
        });

        window.updateStatus = async (productId, newStatus, selectElement) => {
            try {
                const response = await fetch(`/api/perfume/${productId}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                const result = await response.json();
                if (result.success) {
                    const dot = selectElement.previousElementSibling;
                    dot.className = 'dot ' + (newStatus.toLowerCase() === 'active' ? 'green' : 'red');
                } else {
                    alert('Failed to update status');
                }
            } catch (error) {
                console.error('Error updating status:', error);
            }
        };

        searchBtn.addEventListener('click', fetchProducts);
        sortSelect.addEventListener('change', fetchProducts);
        concSelect.addEventListener('change', fetchProducts);
        genderSelect.addEventListener('change', fetchProducts);
        checkboxes.forEach(cb => cb.addEventListener('change', fetchProducts));

        fetchProducts();
    });
</script>

<footer class="main-footer">
    <div class="footer-top">
        <div class="footer-logo">
            <img src="images/icon/full_logo.svg" alt="EXSCENT Logo">
        </div>
    </div>
</footer>
<script>
    const adminUsername = localStorage.getItem('adminUsername');
    document.getElementById('admin-username-display').textContent = adminUsername ? 'Hello, ' + adminUsername : 'Hello';
</script>
</body>
</html>
