<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error: Page not found</title>
    <style>
        .error-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to right, #D9C3AB, #F16001, #C10801, #000000);
        }

        .centered-box {
            width: 90%;
            max-width: 600px;
            padding: 40px;
            background-color: #000000;
            border-radius: 8px;
            color: white;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .back-home-btn {
            color: white;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 5px 10px;
            font-size: 12px;
        }

        .back-home-btn:hover {
            background-color: white;
            color: black;
        }
    </style>
</head>
<body class="error-page"> 
    <main>
        <div class="centered-box">
            <h1>PAGE NOT FOUND</h1>
            <h2>Unfortunately, this page is no longer available on our web site.</h2>
            <a href="/" class="back-home-btn">GO TO HOME PAGE</a>
        </div>
    </main>
</body>
</html>
