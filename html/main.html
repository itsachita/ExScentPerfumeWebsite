<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExScent</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<!-- |||||||||||||||||||||||||||||||||< HEADER APPEARANCE >|||||||||||||||||||||||||||||||||||| -->

<body>
    <header class="main-header">
        <div class="logo">
            <a href="/">
                <img src="images/icon/logo.svg" alt="Logo" style="height: 40px;">
            </a>
        </div>

        <nav class="nav-menu">
            <a href="all-frags">All Fragrances</a>
            <a href="fragrance-feminine">Feminine</a>
            <a href="fragrance-masculine">Masculine</a>
            <a href="fragrance-unisex">Unisex</a>
            <a href="brands">Brands</a>
        </nav>

        <div class="right-section">
            <form class="search-container" action="search.html" method="GET">
                <input type="text" name="q" placeholder="SEARCH">
            </form>
            <div class="icons">
                <a href="/cart">
                    <img src="https://fonts.gstatic.com/s/i/short-term/release/materialsymbolsoutlined/shopping_bag/default/24px.svg"
                        alt="button" style="height: 24px; filter: invert(1);">
                </a>
                <a href="/admin_login">
                    <img src="https://fonts.gstatic.com/s/i/short-term/release/materialsymbolsoutlined/person/default/24px.svg"
                        alt="button" style="height: 24px; filter: invert(1);">
                </a>
            </div>
        </div>
    </header>

    <!-- |||||||||||||||||||||||||||||||||< MAIN APPEARANCE >|||||||||||||||||||||||||||||||||||| -->
    <main>
        <section class="content-wrapper">
            <section class="col-left">
                <div class="row-item item-1">
                    <a href="/">
                        <img src="images/product-ad/img_col0:0.svg" style="width: 100%;">
                    </a>
                </div>
                <div class="row-item item-2">
                    <a href="/product?id=6644093067615">
                        <img src="images/product-ad/img_col0:1.svg" style="width: 100%;">
                    </a>
                </div>
            </section>

            <section class="col-right">
                <div class="row-item item-3">
                    <a href="/">
                        <img src="images/product-ad/img_col1:0.svg" style="width: 100%;">
                    </a>
                </div>
                <div class="row-item item-4">
                    <a href="/">
                        <img src="images/product-ad/img_col1:1.svg" style="width: 100%;">
                    </a>
                </div>
                <div class="row-item item-5">
                    <a href="/">
                        <img src="images/product-ad/img_col1:2.svg" style="width: 100%;">
                    </a>
                </div>
            </section>
        </section>

        <section class="product-pannel" style="display: block; padding-bottom: 60px;">
            <div class="title" style="margin-bottom: 30px;">
                <h1>MORE TO EXPLORE</h1>
            </div>
            <div class="product-scroll" id="all-products" style="display: flex; flex-wrap: wrap; gap: 30px;">
                <!-- Loaded dynamically -->
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/api/search?status=Active');
                const products = await res.json();
                const container = document.getElementById('all-products');

                if (products.length === 0) {
                    container.innerHTML = '<p style="color: rgba(255,255,255,0.5); padding: 20px;">No products available.</p>';
                    return;
                }

                container.innerHTML = products.map(p => `
                <div class="product-item" onclick="window.location.href='/product?id=${p.product_id}'" style="cursor: pointer;">
                    <div class="image-box">
                        <img src="${p.image_url || 'https://via.placeholder.com/300x400?text=No+Image'}" alt="${p.product_name}">
                    </div>
                    <div class="product-info">
                        <p class="brand">${p.brand}</p>
                        <p class="name">${p.product_name}</p>
                        <p class="price">THB ${parseFloat(p.product_price).toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
            } catch (err) {
                console.error('Error loading products:', err);
            }
        });
    </script>

    <!-- |||||||||||||||||||||||||||||||< FOOTER APPEARANCE >|||||||||||||||||||||||||||||||||||| -->
    <footer class="main-footer">
        <div class="footer-top">
            <div class="footer-logo">
                <img src="images/icon/full_logo.svg" alt="EXSCENT Logo">
            </div>

            <div class="newsletter-section">
                <p class="newsletter-title">DON'T MISS THE NEWS, SUBSCRIBE TO OUR NEWSLETTER</p>
                <form class="newsletter-form">
                    <input type="email" placeholder="ENTER YOUR E-MAIL" required>
                    <button type="submit">SUBSCRIBE</button>
                </form>
            </div>
        </div>

        <div class="footer-bottom">
            <nav class="footer-links">
                <a href="/about-us">LEARN MORE</a>
                <a href="/cookies">COOKIES SETTING</a>
                <a href="/policy">PRIVACY & COOKIES POLICY</a>
                <a href="/terms-of-use">TERMS OF USE</a>
            </nav>
            <div class="social-icons">
                <a href="https://www.instagram.com">
                    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/instagram.svg" alt="Logo"
                        style="height: 20px; filter: invert(1);">
                </a>
                <a href="https://www.x.com">
                    <img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/x.svg" alt="Logo"
                        style="height: 20px; filter: invert(1);">
                </a>
            </div>
    </footer>

</body>

</html>
