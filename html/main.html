<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExScent</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <a href="/">
                <img src="images/logo.png" alt="Logo" style="height: 40px;">
            </a>
        </div>

        <nav class="nav-menu">
            <a href="all-frags">All Fragrances</a>
            <a href="fragrance-feminine">Feminine</a>
            <a href="fragrance-masculine">Masculine</a>
            <a href="fragrance-unisex">Unisex</a>
            <a href="brands">Brands</a>
        </nav>

        <div class="right-section">
            <div class="search-container">
                <input type="text" placeholder="SEARCH">
            </div>
            <div class="icons">
                <a href="/cart">
                    <img src="images/shopping_bag.png" alt="Logo" style="height: 25px;">
                </a>
                <a href="/admin_login">
                    <img src="images/admin.png" alt="Logo" style="height: 25px;">
                </a>
            </div>
        </div>
    </header>

    <main>

    </main>

    <footer class="main-footer">
        <div class="footer-top">
            <div class="footer-logo">
                <img src="images/logo_2.png" alt="EXSCENT Logo">
            </div>

            <div class="newsletter-section">
                <p class="newsletter-title">DON'T MISS THE NEWS, SUBSCRIBE TO OUR NEWSLETTER</p>
                <form class="newsletter-form">
                    <input type="email" placeholder="ENTER YOUR E-MAIL" required>
                    <button type="submit">SUBSCRIBE</button>
                </form>
            </div>
        </div>

        <div class="footer-bottom">
            <nav class="footer-links">
            <a href="/about-us">LEARN MORE</a>
            <a href="/cookies">COOKIES SETTING</a>
            <a href="/policy">PRIVACY & COOKIES POLICY</a>
            <a href="/terms-of-use">TERMS OF USE</a>
            </nav>
            <div class="social-icons">
                <a href="https://www.instagram.com">
                    <img src="images/instagram.png" alt="Logo" style="height: 25px;">
                </a>
                <a href="https://www.x.com">
                    <img src="images/x.png" alt="Logo" style="height: 25px;">
                </a>
        </div>
    </footer>
</body>
</html>
