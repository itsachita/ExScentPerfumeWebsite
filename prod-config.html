<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXSCENT - Configuration</title>
    <link rel="stylesheet" href="css/style-admin.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>

<header class="admin-header">
    <div class="admin-nav-group">
        <a href="/" class="logo">
            <img src="images/icon/logo.svg" alt="Logo" style="height: 45px;">
        </a>
        <nav class="admin-nav-links">
            <a href="admin-main">DASHBOARD</a>
            <a href="prod-admin">PRODUCT</a>
            <a href="prod-order">ORDER</a>
            <a href="prod-invoice">INVOICE</a>
        </nav>
    </div>
    
    <div class="admin-right-section">
        <button class="admin-profile-btn">
            <span class="material-symbols-outlined">account_circle</span>
            <span>ADMIN/01</span>
        </button>
        <a href="admin-login" class="admin-logout">
            <span class="material-symbols-outlined" style="color: #FFFFFF">logout</span>
        </a>
    </div>
</header>

<main class="admin-main-content">
    <div class="admin-page-header">
        <h1>CONFIGURATION</h1>
        <div class="header-actions">
            <a href="/admin_main" class="btn-outline">
                <span class="material-symbols-outlined" style="font-size: 18px;">check</span> CONFIRM
            </a>
        </div>
    </div>

    <div class="config-container">
        <!-- Left Column: Images -->
        <div class="config-left">
            <h2 class="config-section-title">PRODUCT IMAGE</h2>
            
            <div class="img-placeholder-large">
                <span class="material-symbols-outlined" style="font-size: 40px; color: rgba(255,255,255,0.5);">add_photo_alternate</span>
            </div>
            
            <div class="img-placeholder-row">
                <div class="img-placeholder-small"><span class="material-symbols-outlined">add</span></div>
                <div class="img-placeholder-small"><span class="material-symbols-outlined">add</span></div>
                <div class="img-placeholder-small"><span class="material-symbols-outlined">add</span></div>
                <div class="img-placeholder-small"><span class="material-symbols-outlined">add</span></div>
            </div>
            
            <button class="btn-outline btn-full-width" style="margin-top: 15px;">+ ADD IMAGE</button>
            
            <p class="config-help-text">
                Max File Size: 5MB<br>
                Aspect Ratio Should Be 4:3
            </p>
        </div>

        <!-- Right Column: Form -->
        <div class="config-right">
            <h2 class="config-section-title">GENERAL INFORMATION</h2>
            
            <div class="form-row" style="grid-template-columns: 2fr 1fr;">
                <div class="form-group">
                    <label>Product ID</label>
                    <input type="text" class="config-input">
                </div>
                <div class="form-group">
                    <label>&nbsp;</label>
                    <div class="status-select-wrapper" style="width: 100%; height: 35px;">
                        <span class="dot green"></span>
                        <select class="status-select" style="height: 100%; padding-top: 0; padding-bottom: 0;" onchange="this.previousElementSibling.className = 'dot ' + (this.value === 'active' ? 'green' : 'red')">
                            <option value="active">Status</option>
                            <option value="disabled">Disabled</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" class="config-input">
                </div>
                <div class="form-group">
                    <label>Brand</label>
                    <input type="text" class="config-input">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Concentration</label>
                    <div class="config-select-dark-wrapper">
                        <select class="config-select-dark">
                            <option>EDT</option>
                            <option>EDP</option>
                            <option>Parfum</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Gender Preference</label>
                    <div class="config-select-dark-wrapper">
                        <select class="config-select-dark">
                            <option>UNISEX</option>
                            <option>MASCULINE</option>
                            <option>FEMININE</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-group" style="margin-top: 20px;">
                <label>Description</label>
                <textarea class="config-textarea" rows="6"></textarea>
            </div>

            <h2 class="config-section-title" style="margin-top: 30px;">PRICING & STOCK</h2>
            <div class="form-row" style="grid-template-columns: 1fr 2fr auto; align-items: end;">
                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" class="config-input">
                </div>
                <div class="form-group">
                    <label>Price & Volume</label>
                    <input type="text" class="config-input">
                </div>
                <div class="form-group">
                    <button class="btn-add-square">
                        <span class="material-symbols-outlined">add</span>
                    </button>
                </div>
            </div>

        </div>
    </div>
</main>

<footer class="main-footer">
    <div class="footer-top">
        <div class="footer-logo">
            <img src="images/icon/full_logo.svg" alt="EXSCENT Logo">
        </div>
    </div>
</footer>

</body>
</html>
